name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

  # Allow manual trigger
  workflow_dispatch:

# Grant GH_TOKEN the Pages permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (validate compilation)
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site

          # Landing page → served at /Doshomik_IELTS/
          cp index.html _site/

          # Study page with base-href rewrite for GH Pages subpath
          sed 's|<head>|<head>\n  <base href="/Doshomik_IELTS/">|' study.html > _site/study.html

          # public/ assets (favicon, svg, etc.)
          cp -r public/* _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
